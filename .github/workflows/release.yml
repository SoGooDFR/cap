name: Release image

# Builds and pushes the standalone Docker image to GitHub Container Registry
# (ghcr.io/<owner>/cap) on semver tags. Push a tag to release:
#
#   git tag v3.1.5 && git push origin v3.1.5
#
# The image is tagged 3.1.5, 3.1, 3 and latest. Can also be run manually from
# the Actions tab (workflow_dispatch), which builds but pushes only the ref tag.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/cap

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
          # Mark "latest" on the highest non-prerelease tag only.
          flavor: latest=auto

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: standalone/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'workflow_dispatch' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
