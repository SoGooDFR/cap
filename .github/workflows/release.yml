name: Release

# All-in-one release driven by Cap's own version. Pushing a semver tag builds
# and publishes BOTH the Docker image and the Helm chart, versioned from the tag:
#
#   git tag v3.1.6 && git push origin v3.1.6
#
# Produces:
#   ghcr.io/<owner>/cap:3.1.6  (+ 3.1, 3, latest)
#   oci://ghcr.io/<owner>/charts/cap  version 3.1.6 (appVersion 3.1.6)
#
# workflow_dispatch builds everything but pushes nothing (dry run).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/cap
  # Widget/wasm versions baked into the image (air-gap asset serving).
  # Keep in sync with assets.airgap.{widgetVersion,wasmVersion} in the Helm chart.
  WIDGET_VERSION: "0.1.56"
  WASM_VERSION: "0.0.7"

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
          # Mark "latest" on the highest non-prerelease tag only.
          flavor: latest=auto

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: standalone/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'workflow_dispatch' }}
          build-args: |
            WIDGET_VERSION=${{ env.WIDGET_VERSION }}
            WASM_VERSION=${{ env.WASM_VERSION }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  chart:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Resolve version from tag
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            v=$(grep '^version:' deploy/helm/cap/Chart.yaml | awk '{print $2}')
            echo "push=false" >> "$GITHUB_OUTPUT"
          else
            v="${GITHUB_REF_NAME#v}"
            echo "push=true" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Chart/app version: $v"

      - name: Lint
        run: helm lint deploy/helm/cap --set secrets.adminKey=lintplaceholder

      - name: Package
        run: |
          helm package deploy/helm/cap \
            --version "${{ steps.ver.outputs.version }}" \
            --app-version "${{ steps.ver.outputs.version }}" \
            --destination /tmp/chart

      - name: Log in to GHCR
        if: steps.ver.outputs.push == 'true'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push chart
        if: steps.ver.outputs.push == 'true'
        run: |
          owner_lc=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          chart_tgz=$(ls /tmp/chart/cap-*.tgz)
          echo "Pushing $chart_tgz to oci://ghcr.io/$owner_lc/charts"
          helm push "$chart_tgz" "oci://ghcr.io/$owner_lc/charts"
