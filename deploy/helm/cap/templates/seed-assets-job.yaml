{{- if .Values.assets.airgap.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "cap.fullname" . }}-seed-assets
  labels:
    {{- include "cap.labels" . | nindent 4 }}
  annotations:
    # Runs after the Secret exists, on every install/upgrade. Idempotent.
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "cap.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: seed-assets
    spec:
      restartPolicy: Never
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "cap.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: seed-assets
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          command: ["bun", "run", "scripts/seed-assets.js"]
          env:
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "cap.secretName" . }}
                  key: {{ .Values.secrets.redisUrlSecretKey }}
            {{- with .Values.config.REDIS_CLUSTER }}
            - name: REDIS_CLUSTER
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.config.REDIS_PREFIX }}
            - name: REDIS_PREFIX
              value: {{ . | quote }}
            {{- end }}
            - name: ASSET_BUNDLE_DIR
              value: {{ .Values.assets.airgap.bundleDir | quote }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
