{{- if not .Values.secrets.existingSecret }}
{{- if not .Values.secrets.adminKey }}
{{- fail "secrets.adminKey is required (>= 12 chars) unless secrets.existingSecret is set" }}
{{- end }}
{{- if lt (len .Values.secrets.adminKey) 12 }}
{{- fail "secrets.adminKey must be at least 12 characters" }}
{{- end }}
{{- if not .Values.secrets.redisUrl }}
{{- fail "secrets.redisUrl is required unless secrets.existingSecret is set" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cap.fullname" . }}
  labels:
    {{- include "cap.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.secrets.adminKeySecretKey }}: {{ .Values.secrets.adminKey | quote }}
  {{ .Values.secrets.redisUrlSecretKey }}: {{ .Values.secrets.redisUrl | quote }}
{{- end }}
