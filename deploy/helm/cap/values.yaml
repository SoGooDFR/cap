# Default values for the Cap standalone chart.

replicaCount: 2

image:
  repository: ghcr.io/sogoodfr/cap
  pullPolicy: IfNotPresent
  # Defaults to the chart's appVersion when empty.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# -- Admin key and Redis connection. Both are required by the app.
# By default a Secret is created from the values below. To use a Secret you
# manage yourself, set `existingSecret` and the key names; the inline values
# are then ignored.
secrets:
  # Admin key for the dashboard / API. Must be at least 12 characters.
  adminKey: ""
  # Redis/Valkey connection string. In cluster mode, a comma-separated list
  # of seed nodes, e.g. redis://node-1:6379,redis://node-2:6379
  redisUrl: "redis://valkey:6379"
  # Use an existing Secret instead of creating one.
  existingSecret: ""
  adminKeySecretKey: "ADMIN_KEY"
  redisUrlSecretKey: "REDIS_URL"

# -- Non-sensitive environment variables. Empty values are skipped.
# See docs/guide/standalone/options.md for the full list.
config:
  # High availability: set to "true" to connect to a Redis/Valkey Cluster.
  REDIS_CLUSTER: ""
  # Namespace all keys (e.g. "cap:"). Only on a fresh instance.
  REDIS_PREFIX: ""
  # Comma-separated allowed CORS origins.
  CORS_ORIGIN: ""
  # Header to read the client IP from (behind a proxy/LB), e.g. X-Forwarded-For.
  RATELIMIT_IP_HEADER: "X-Forwarded-For"
  HIDE_RATELIMIT_IP_WARNING: ""
  DISABLE_ERROR_LOGGING: ""
  SHOW_ERRORS: ""
  DEMO_MODE: ""
  ENABLE_ASSETS_SERVER: ""
  RSW_BITS: ""

# -- Extra raw env entries (list of {name,value} or valueFrom).
extraEnv: []
# -- Mount all keys of these ConfigMaps/Secrets as env.
envFrom: []

serviceAccount:
  create: true
  automount: false
  annotations: {}
  name: ""

service:
  type: ClusterIP
  port: 80
  # Container port (SERVER_PORT). The app listens on 3000 by default.
  targetPort: 3000
  annotations: {}

# -- Ingress (mutually exclusive with gateway in practice; enable one).
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: cap.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: cap-tls
  #    hosts: [cap.example.com]

# -- Gateway API HTTPRoute (gateway.networking.k8s.io/v1).
gateway:
  enabled: false
  parentRefs:
    - name: ""
      namespace: ""
      sectionName: ""
  hostnames:
    - cap.example.com
  # Matches under the route; default matches everything.
  matches:
    - path:
        type: PathPrefix
        value: /
  annotations: {}

# -- Writable directory for runtime-downloaded GeoIP databases
# (/usr/src/app/data). The app is stateless (all state lives in Redis and the
# GeoIP files are re-fetchable), so this is a plain emptyDir, not a PVC.
dataDir:
  path: /usr/src/app/data
  # Optional cap on the emptyDir size (e.g. 512Mi). Empty = no limit.
  sizeLimit: ""

# -- Rootless / hardened security context. The image already runs as the
# non-root `bun` user (uid 1000).
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: "1"
    memory: 512Mi

livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 10
  periodSeconds: 15
  timeoutSeconds: 3
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /
    port: http
  periodSeconds: 5
  failureThreshold: 30

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 75
  targetMemoryUtilizationPercentage: ""

# -- PodDisruptionBudget (recommended for HA).
podDisruptionBudget:
  enabled: false
  minAvailable: 1
  maxUnavailable: ""

# -- Spread replicas for availability.
topologySpreadConstraints: []
affinity: {}
nodeSelector: {}
tolerations: []

podAnnotations: {}
podLabels: {}

# Extra volumes/mounts beyond the managed data + tmp ones.
extraVolumes: []
extraVolumeMounts: []
